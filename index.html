<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Cube Dash 2D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0015; overflow: hidden; font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
    canvas { display: block; }

    #overlay, #gameover, #win {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; z-index: 10;
    }
    #overlay  { background: rgba(0,0,0,0.8); }
    #gameover { background: rgba(0,0,0,0.82); display: none; }
    #win      { background: rgba(0,0,0,0.82); display: none; }

    h1 { font-size: 48px; text-shadow: 0 0 20px cyan; margin-bottom: 10px; }
    h2.dead { font-size: 52px; color: #ff4444; text-shadow: 0 0 20px red; }
    h2.win  { font-size: 52px; color: #ffdd00; text-shadow: 0 0 30px #ffaa00; }
    p { font-size: 17px; opacity: 0.8; margin: 5px 0; }
    .score-line { font-size: 26px; color: #00ffcc; text-shadow: 0 0 8px #00ffcc; margin-top: 10px; }

    button {
      margin-top: 26px; padding: 13px 46px;
      font-size: 20px; border: none; border-radius: 12px;
      color: white; cursor: pointer; font-weight: bold;
      transition: transform 0.1s;
    }
    button:hover { transform: scale(1.06); }
    .btn-blue   { background: linear-gradient(135deg, #00f2ff, #0080ff); box-shadow: 0 0 18px #0080ff88; }
    .btn-red    { background: linear-gradient(135deg, #ff4444, #ff8800); box-shadow: 0 0 18px #ff444488; }
    .btn-gold   { background: linear-gradient(135deg, #ffcc00, #ff8800); color: #000; box-shadow: 0 0 18px #ffaa0088; }

    #color-panel {
      position: fixed; right: 12px; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 7px;
      z-index: 5;
    }
    #color-panel span { color: white; font-size: 11px; text-align: center; opacity: 0.7; }
    .cbtn {
      width: 36px; height: 36px; border-radius: 8px;
      border: 3px solid transparent; cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
    }
    .cbtn:hover { transform: scale(1.15); }
    .cbtn.active { border-color: white; transform: scale(1.2); }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="color-panel">
  <span>Farbe</span>
</div>

<div id="overlay">
  <h1>&#x25A0; Cube Dash</h1>
  <p>Spring und fliege über Hindernisse!</p>
  <p>Tippen / Klicken = Springen &nbsp;|&nbsp; Halten = Fliegen</p>
  <button class="btn-blue" id="start-btn" style="margin-top:24px">Level auswählen</button>
</div>

<div id="level-select" style="position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);z-index:10;color:white;">
  <h2 style="font-size:36px;margin-bottom:20px;text-shadow:0 0 16px cyan">Level wählen</h2>
  <div id="level-grid" style="display:flex;flex-direction:column;gap:12px;width:320px"></div>
</div>

<div id="gameover">
  <h2 class="dead">&#x2715; Game Over</h2>
  <p class="score-line" id="go-score"></p>
  <div style="display:flex;gap:14px;margin-top:24px">
    <button class="btn-red"  id="retry-btn">Nochmal</button>
    <button class="btn-blue" id="go-select-btn">Level wählen</button>
  </div>
</div>

<div id="win">
  <h2 class="win">&#x1F3C6; Gewonnen!</h2>
  <p id="win-level-name" style="font-size:20px;opacity:0.8;margin-top:6px"></p>
  <p class="score-line" id="win-score"></p>
  <div style="display:flex;gap:14px;margin-top:24px;flex-wrap:wrap;justify-content:center">
    <button class="btn-gold"  id="win-next-btn">Nächstes Level &#x25BA;</button>
    <button class="btn-blue"  id="win-select-btn">Level wählen</button>
    <button class="btn-red"   id="again-btn">Nochmal</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Resize ────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Colors ────────────────────────────────────────────────────────────
const COLORS = [
  '#00aaff','#ff4444','#44ee44','#ffcc00',
  '#ff44ff','#ff8800','#00ffcc','#ffffff'
];
let colorIdx = 0;

const panel = document.getElementById('color-panel');
COLORS.forEach((c, i) => {
  const btn = document.createElement('div');
  btn.className = 'cbtn' + (i === 0 ? ' active' : '');
  btn.style.background = c;
  btn.addEventListener('click', () => {
    colorIdx = i;
    document.querySelectorAll('.cbtn').forEach((b,j) => b.classList.toggle('active', j===i));
  });
  panel.appendChild(btn);
});

// ── Game constants ────────────────────────────────────────────────────
const GROUND_RATIO = 0.75;
const CUBE_SIZE    = 40;
const GRAVITY      = 1800;
const FLY_THRUST   = -2600;
const JUMP_V       = -680;

// ── Level definitions ─────────────────────────────────────────────────
const LEVELS = [

    glowColor: '#4466ff',
    starColor: 'rgba(255,255,255,',

  {
    num: 3,

    glowColor: '#ff00aa',

        { type:'spike',   h:58 }, { type:'ceiling', h:82, dx:0 },
        { type:'block',   wyFrac:0.36, bw:36, bh:36, dx:140 },

      ...spaced(2000, 12000, 600, () => [

      ...spaced(3000, 12000, 500, () => [

      // wall-to-wall ground spikes, groups of 3-6

      ...spaced(620, 16000, 100, () => [

      ...spaced(1800, 16000, 500, () => [

      ...spaced(800, 16000, 120, () => [

      ...spaced(1100, 16000, 350, () => [

      ]),

      ...spaced(2200, 16000, 600, () => [

      ]),
    ],
    length: 16500,
  },
  {
    num: 6,
    name: '☠ HÖLLE',
    speed: 920,
    bgTop: '#000000', bgBot: '#0d0000',
    groundColor: '#0d0000',
    glowColor: '#ff0000',
    starColor: 'rgba(255,50,50,',
    obstacles: [
      // nonstop 5-7 spike walls every 70px
      ...spaced(600, 18000, 70, () => {
        const n = 5 + Math.floor(Math.random()*3);
        return Array.from({length:n}, (_,i) => ({ type:'spike', h:70+i*7, dx:i*38 }));
      }),
      // ceiling every 80px
      ...spaced(600, 18000, 80, () => [

      ]),

      ...spaced(600, 18000, 110, () => [
        { type:'block', wyFrac: 0.12 + Math.random()*0.48, bw:55, bh:45 }
      ]),
      // brutal 8-piece gauntlets
      ...spaced(800, 18000, 220, () => [
        { type:'spike',   h:70 },
        { type:'ceiling', h:100, dx:0 },
        { type:'block',   wyFrac:0.28, bw:44, bh:44, dx:100 },

        { type:'spike',   h:72,  dx:220 },

      ]),
      // 5-spike ceiling walls

        { type:'ceiling', h:110, dx:176 },
      ]),
      // mega spikes h:100+
      ...spaced(700, 18000, 90, () => [
        { type:'spike', h:95 + Math.random()*30 },
      ]),

      ]),
      // mid spikes dense — every 200px
      ...spaced(900, 18000, 200, () => [
        { type:'midspike', wyFrac: 0.22 + Math.random()*0.32, h:48 },
      ]),
      // mid-spike triplets — 3 in a row to navigate through
      ...spaced(1500, 18000, 450, () => [
        { type:'midspike', wyFrac:0.25, h:46, dx:0 },
        { type:'midspike', wyFrac:0.45, h:46, dx:80 },
        { type:'midspike', wyFrac:0.25, h:46, dx:160 },
      ]),
    ],
    length: 18500,
  },
];

// Helper: generate evenly spaced obstacle groups
function spaced(startX, endX, gap, factory) {
  const result = [];
  for (let x = startX; x < endX; x += gap + Math.random()*gap*0.4) {
    const items = factory();
    for (const item of items) {
      result.push({ type: item.type, wx: x + (item.dx||0),
        h: item.h, wyFrac: item.wyFrac, bw: item.bw, bh: item.bh });
    }
  }
  return result;
}

let currentLevel = 0; // index into LEVELS

function buildLevel(levelIdx) {
  const def = LEVELS[levelIdx];
  // deep-copy obstacles so they aren't mutated
  return def.obstacles.map(o => ({...o}));
}

// ── State ─────────────────────────────────────────────────────────────
let running   = false;
let dead      = false;
let won       = false;
let cubeY     = 0;
let velY      = 0;
let onGround  = true;
let jumpsLeft = 2;
let flying    = false;
let worldX    = 0;
let score     = 0;
let speed     = LEVELS[0].speed;
let obstacles = [];
let particles = [];
let stars     = [];
let rotAngle  = 0;

// Parallax BG columns
function buildBG() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * 4000,
      y: Math.random() * 0.7,
      r: Math.random() * 1.8 + 0.4,
      speed: 0.1 + Math.random() * 0.3,
    });
  }
}

function resetGame(levelIdx) {
  if (levelIdx !== undefined) currentLevel = levelIdx;
  const def = LEVELS[currentLevel];

  dead      = false;
  won       = false;
  score     = 0;
  speed     = def.speed;
  worldX    = 0;
  velY      = 0;
  onGround  = true;
  jumpsLeft = 2;
  flying    = false;
  rotAngle  = 0;
  particles = [];
  obstacles = buildLevel(currentLevel);
  buildBG();

  const gh = canvas.height;
  cubeY = gh * GROUND_RATIO - CUBE_SIZE;

  document.getElementById('gameover').style.display = 'none';
  document.getElementById('win').style.display      = 'none';
  document.getElementById('level-select').style.display = 'none';
  running = true;
}

// ── Input ─────────────────────────────────────────────────────────────
function pressStart() {
  if (!running || dead || won) return;
  if (jumpsLeft > 0) {
    velY = JUMP_V;
    onGround = false;
    jumpsLeft--;
  }
  flying = true;
}
function pressEnd() { flying = false; }

window.addEventListener('contextmenu', e => { e.preventDefault(); pressStart(); });
window.addEventListener('mousedown',   e => { if (e.button === 2) return; pressStart(); });
window.addEventListener('mouseup',     () => pressEnd());
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); pressStart(); }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') pressEnd();
});
window.addEventListener('touchstart', e => { e.preventDefault(); pressStart(); }, { passive: false });
window.addEventListener('touchend',   e => { e.preventDefault(); pressEnd();   }, { passive: false });

// Build level-select buttons
const levelGrid = document.getElementById('level-grid');
const DIFF_COLORS = ['#00aaff','#44ee44','#ffcc00','#ff8800','#ff3333','#880000'];
LEVELS.forEach((lv, i) => {
  const btn = document.createElement('button');
  btn.style.cssText = `padding:12px 20px;font-size:17px;font-weight:bold;border:none;
    border-radius:10px;cursor:pointer;background:${DIFF_COLORS[i]};
    color:${i>=3?'#fff':'#000'};box-shadow:0 0 12px ${DIFF_COLORS[i]}88;
    transition:transform 0.1s;`;
  btn.textContent = `Level ${lv.num}: ${lv.name}`;
  btn.addEventListener('mouseenter', () => btn.style.transform='scale(1.04)');
  btn.addEventListener('mouseleave', () => btn.style.transform='scale(1)');
  btn.addEventListener('click', () => { resetGame(i); });
  levelGrid.appendChild(btn);
});

function showLevelSelect() {
  document.getElementById('overlay').style.display    = 'none';
  document.getElementById('gameover').style.display   = 'none';
  document.getElementById('win').style.display        = 'none';
  document.getElementById('level-select').style.display = 'flex';
  running = false;
}

document.getElementById('start-btn').addEventListener('click', showLevelSelect);
document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('gameover').style.display = 'none';
  resetGame();
});
document.getElementById('go-select-btn').addEventListener('click', showLevelSelect);
document.getElementById('again-btn').addEventListener('click', () => {
  document.getElementById('win').style.display = 'none';
  resetGame();
});
document.getElementById('win-next-btn').addEventListener('click', () => {
  document.getElementById('win').style.display = 'none';
  resetGame(Math.min(currentLevel + 1, LEVELS.length - 1));
});
document.getElementById('win-select-btn').addEventListener('click', showLevelSelect);

// ── Particles ─────────────────────────────────────────────────────────
function spawnParticles(screenX, screenY, color) {
  for (let i = 0; i < 22; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 80 + Math.random() * 260;
    particles.push({
      x: screenX, y: screenY,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 100,
      life: 1.0,
      color,
      size: 4 + Math.random() * 6,
    });
  }
}

// ── Draw helpers ──────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function drawSpike(sx, groundY, h, w) {
  const base = w || 38;
  ctx.beginPath();
  ctx.moveTo(sx, groundY);
  ctx.lineTo(sx + base, groundY);
  ctx.lineTo(sx + base/2, groundY - h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(sx, groundY, sx, groundY - h);
  grad.addColorStop(0, '#ff2244');
  grad.addColorStop(1, '#ff8800');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#ff0055';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawCeilingSpike(sx, h, w) {
  const base = w || 38;
  ctx.beginPath();
  ctx.moveTo(sx, 0);
  ctx.lineTo(sx + base, 0);
  ctx.lineTo(sx + base/2, h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(sx, 0, sx, h);
  grad.addColorStop(0, '#aa00ff');
  grad.addColorStop(1, '#ff00aa');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#cc00ff';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawBlock(sx, by, bw, bh) {
  const grad = ctx.createLinearGradient(sx, by, sx, by + bh);
  grad.addColorStop(0, '#ff6600');
  grad.addColorStop(1, '#ff2200');
  ctx.fillStyle = grad;
  ctx.fillRect(sx, by, bw, bh);
  ctx.strokeStyle = '#ff8800';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx, by, bw, bh);
  // inner shine
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(sx + 3, by + 3, bw - 6, bh * 0.4);
}

function drawCube(sx, sy, color) {
  const s = CUBE_SIZE;
  ctx.save();
  ctx.translate(sx + s/2, sy + s/2);
  ctx.rotate(rotAngle);

  // Shadow
  ctx.shadowColor = color;
  ctx.shadowBlur  = 18;

  // Face
  ctx.fillStyle = color;
  ctx.fillRect(-s/2, -s/2, s, s);

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(-s/2, -s/2, s, s/2.5);

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.strokeRect(-s/2, -s/2, s, s);

  // Inner cross lines
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,-s/2); ctx.lineTo(0,s/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-s/2,0); ctx.lineTo(s/2,0); ctx.stroke();

  ctx.restore();
}

function drawFinishGate(sx, groundY) {
  const gw = 20, gh = 160, top = groundY - gh;
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.004);

  ctx.shadowColor = '#ffdd00';
  ctx.shadowBlur  = 30 * pulse;

  // Pillars
  const pillarGrad = ctx.createLinearGradient(0, top, 0, groundY);
  pillarGrad.addColorStop(0, '#ffee88');
  pillarGrad.addColorStop(1, '#ff8800');
  ctx.fillStyle = pillarGrad;
  ctx.fillRect(sx - gw/2,      top, gw, gh);
  ctx.fillRect(sx + 90 - gw/2, top, gw, gh);

  // Crossbar
  ctx.fillStyle = '#ffdd00';
  ctx.fillRect(sx - gw/2, top, 90 + gw, gw);

  // Checkered flag pattern
  const flagW = 90 + gw, flagH = 28;
  const tileW = flagW / 5, tileH = flagH / 2;
  for (let col = 0; col < 5; col++) {
    for (let row = 0; row < 2; row++) {
      ctx.fillStyle = (col + row) % 2 === 0 ? '#fff' : '#222';
      ctx.fillRect(sx - gw/2 + col*tileW, top + gw + row*tileH, tileW, tileH);
    }
  }
  ctx.strokeStyle = '#ffdd00';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx - gw/2, top + gw, flagW, flagH);

  // ZIEL text
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('ZIEL', sx + 45, top - 12);
  ctx.textAlign = 'left';
}

function drawMidSpike(sx, sy, h, w) {
  // spike pointing right (from left wall) — actually a spike at mid height pointing up AND down
  const base = w || 38;
  // upward spike
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(sx + base, sy);
  ctx.lineTo(sx + base/2, sy - h);
  ctx.closePath();
  const gUp = ctx.createLinearGradient(sx, sy, sx, sy - h);
  gUp.addColorStop(0, '#ffaa00');
  gUp.addColorStop(1, '#ff4400');
  ctx.fillStyle = gUp;
  ctx.fill();
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // downward spike
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(sx + base, sy);
  ctx.lineTo(sx + base/2, sy + h);
  ctx.closePath();
  const gDown = ctx.createLinearGradient(sx, sy, sx, sy + h);
  gDown.addColorStop(0, '#ffaa00');
  gDown.addColorStop(1, '#ff0000');
  ctx.fillStyle = gDown;
  ctx.fill();
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}


let lastTime = null;

function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastTime) { lastTime = ts; return; }
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  const W = canvas.width, H = canvas.height;
  const groundY = H * GROUND_RATIO;
  const cubeScreenX = W * 0.2;

  // ── Update ──────────────────────────────────────────────────────────
  if (running && !dead && !won) {
    const dist = speed * dt;
    worldX += dist;

    // Physics — fly thrust overrides gravity while held in air
    if (flying && !onGround) {
      velY += FLY_THRUST * dt;
      velY  = Math.max(velY, -500); // cap upward speed
    } else {
      velY += GRAVITY * dt;
    }
    cubeY += velY * dt;

    // Ceiling clamp
    if (cubeY < 0) { cubeY = 0; velY = 0; }

    const groundedY = groundY - CUBE_SIZE;
    if (cubeY >= groundedY) {
      cubeY     = groundedY;
      velY      = 0;
      onGround  = true;
      jumpsLeft = 2;
    } else {
      onGround = false;
    }

    // Rolling (spin faster when flying)
    rotAngle += dist / (CUBE_SIZE / 2) * (onGround ? 1 : flying ? 2 : 0.5);

    // Score (speed stays fixed per level — set by level def)
    score += dist / 10;

    // Collision check
    const cubeLeft   = cubeScreenX + 5;
    const cubeRight  = cubeScreenX + CUBE_SIZE - 5;
    const cubeTop    = cubeY + 5;
    const cubeBottom = cubeY + CUBE_SIZE - 5;
    let hit = false;

    for (const ob of obstacles) {
      const sx = ob.wx - worldX + cubeScreenX;
      if (sx < -100 || sx > canvas.width + 100) continue;

      if (ob.type === 'spike') {
        const sl = sx + 6, sr = sx + 32;
        const st = groundY - ob.h + 10;
        if (cubeRight > sl && cubeLeft < sr && cubeBottom > st) { hit = true; break; }

      } else if (ob.type === 'ceiling') {
        const sl = sx + 6, sr = sx + 32;
        const sb = ob.h - 10; // bottom of ceiling spike
        if (cubeRight > sl && cubeLeft < sr && cubeTop < sb) { hit = true; break; }

      } else if (ob.type === 'block') {
        const by = ob.wyFrac * groundY;
        const bl = sx, br = sx + ob.bw;
        const bt = by, bb = by + ob.bh;
        if (cubeRight > bl && cubeLeft < br && cubeBottom > bt && cubeTop < bb) { hit = true; break; }
      } else if (ob.type === 'midspike') {
        const my = ob.wyFrac * groundY;
        const ml = sx + 6, mr = sx + 32;
        // both up and down spikes count
        if (cubeRight > ml && cubeLeft < mr) {
          if (cubeTop < my + ob.h * 0.85 && cubeBottom > my - ob.h * 0.85) { hit = true; break; }
        }
      }
    }

    if (hit) {
      running = false;
      spawnParticles(cubeScreenX + CUBE_SIZE/2, cubeY + CUBE_SIZE/2, COLORS[colorIdx]);
      setTimeout(() => {
        document.getElementById('go-score').textContent = 'Score: ' + Math.floor(score);
        document.getElementById('gameover').style.display = 'flex';
      }, 600);
    }

    // Win check
    const levelLen = LEVELS[currentLevel].length;
    if (worldX >= levelLen) {
      running = false;
      won     = true;
      spawnParticles(cubeScreenX + CUBE_SIZE/2, cubeY + CUBE_SIZE/2, '#ffdd00');
      spawnParticles(cubeScreenX + CUBE_SIZE/2, cubeY + CUBE_SIZE/2, '#00ffcc');
      setTimeout(() => {
        const isLast = currentLevel === LEVELS.length - 1;
        document.getElementById('win-score').textContent = 'Score: ' + Math.floor(score);
        document.getElementById('win-level-name').textContent = `Level ${LEVELS[currentLevel].num}: ${LEVELS[currentLevel].name} geschafft!`;
        document.getElementById('win-next-btn').style.display = isLast ? 'none' : 'inline-block';
        document.getElementById('win-select-btn').style.display = 'inline-block';
        document.getElementById('win').style.display = 'flex';
      }, 800);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x    += p.vx * dt;
    p.y    += p.vy * dt;
    p.vy   += GRAVITY * 0.4 * dt;
    p.life -= dt * 1.8;
    if (p.life <= 0) { particles.splice(i, 1); }
  }

  // ── Draw ─────────────────────────────────────────────────────────────
  const def = LEVELS[currentLevel];

  // Background gradient (level-themed)
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0,   def.bgTop);
  bgGrad.addColorStop(1,   def.bgBot);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars (parallax)
  ctx.shadowBlur = 0;
  for (const s of stars) {
    const sx = ((s.x - worldX * s.speed) % (W + 200) + W + 200) % (W + 200);
    const sy = s.y * groundY;
    ctx.beginPath();
    ctx.arc(sx, sy, s.r, 0, Math.PI*2);
    ctx.fillStyle = def.starColor + (0.3 + s.r * 0.2) + ')';
    ctx.fill();
  }

  // Ground
  const floorGrad = ctx.createLinearGradient(0, groundY, 0, H);
  floorGrad.addColorStop(0, def.groundColor);
  floorGrad.addColorStop(1, '#050505');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Grid lines on floor
  ctx.strokeStyle = 'rgba(150,150,255,0.12)';
  ctx.lineWidth = 1;
  const gridSpacing = 60;
  const gridOff = worldX % gridSpacing;
  for (let gx = -gridOff; gx < W; gx += gridSpacing) {
    ctx.beginPath(); ctx.moveTo(gx, groundY); ctx.lineTo(gx, H); ctx.stroke();
  }
  // Glowing ground line
  ctx.shadowColor = def.glowColor;
  ctx.shadowBlur  = 14;
  ctx.strokeStyle = def.glowColor;
  ctx.lineWidth   = 2;
  ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();
  ctx.shadowBlur  = 0;

  // Obstacles
  for (const ob of obstacles) {
    const sx = ob.wx - worldX + cubeScreenX;
    if (sx < -100 || sx > W + 100) continue;
    ctx.shadowBlur = 10;
    if (ob.type === 'spike') {
      ctx.shadowColor = '#ff2244';
      drawSpike(sx, groundY, ob.h);
    } else if (ob.type === 'ceiling') {
      ctx.shadowColor = '#cc00ff';
      drawCeilingSpike(sx, ob.h);
    } else if (ob.type === 'block') {
      ctx.shadowColor = '#ff6600';
      drawBlock(sx, ob.wyFrac * groundY, ob.bw, ob.bh);
    } else if (ob.type === 'midspike') {
      ctx.shadowColor = '#ffaa00';
      drawMidSpike(sx, ob.wyFrac * groundY, ob.h);
    }
    ctx.shadowBlur = 0;
  }

  // Flying indicator (rocket trail when flying)
  if (flying && running && !dead && !won) {
    const cx = cubeScreenX + CUBE_SIZE/2;
    const cy = cubeY + CUBE_SIZE;
    for (let i = 0; i < 3; i++) {
      ctx.globalAlpha = 0.4 - i * 0.12;
      ctx.fillStyle = i % 2 === 0 ? '#ffcc00' : '#ff4400';
      ctx.beginPath();
      ctx.arc(cx + (Math.random()-0.5)*10, cy + i*10 + Math.random()*6, 5-i, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Finish gate
  const finSX = LEVELS[currentLevel].length - worldX + cubeScreenX;
  if (finSX > -200 && finSX < W + 200) {
    drawFinishGate(finSX, groundY);
  }

  // Cube (only if not dead-exploded)
  if (!dead) {
    ctx.shadowBlur = 0;
    drawCube(cubeScreenX, cubeY, COLORS[colorIdx]);
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur  = 0;

  // HUD — score
  if (running || won) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px Arial';
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur  = 10;
    ctx.fillText('Score: ' + Math.floor(score) + (flying ? '  🚀' : ''), 16, 36);
    ctx.shadowBlur = 0;

    // Level label top-right
    ctx.fillStyle = def.glowColor;
    ctx.font = 'bold 16px Arial';
    ctx.shadowColor = def.glowColor; ctx.shadowBlur = 8;
    ctx.textAlign = 'right';
    ctx.fillText(`Level ${def.num}: ${def.name}`, W - 60, 32);
    ctx.textAlign = 'left'; ctx.shadowBlur = 0;

    // Progress bar
    const barW = Math.min(W * 0.5, 400);
    const barX = (W - barW) / 2, barY = 14;
    const prog = Math.min(worldX / LEVELS[currentLevel].length, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.roundRect(barX, barY, barW, 10, 5); ctx.fill();
    const barFill = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    barFill.addColorStop(0, def.glowColor);
    barFill.addColorStop(1, '#00ffcc');
    ctx.fillStyle = barFill;
    ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.roundRect(barX, barY, barW * prog, 10, 5); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(Math.floor(prog*100) + '%', W/2, barY + 22);
    ctx.textAlign = 'left';
  }
}

requestAnimationFrame(loop);
</script>
</body>
</html>
